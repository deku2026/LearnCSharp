apiVersion: v1
kind: Namespace
metadata:
  name: campus
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: campus-config
  namespace: campus
data:
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.observability:4317
  OTEL_EXPORTER_OTLP_PROTOCOL: grpc
  GatewayAuth__Issuer: campus-gateway
  GatewayAuth__Audience: campus-capstone
  Distributed__CatalogHttpUrl: http://catalog:8080
  Distributed__CatalogGrpcUrl: http://catalog:8081
  Distributed__EnrollmentUrl: http://enrollment:8080
  Distributed__NoticesUrl: http://notices:8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog
  namespace: campus
  labels:
    app.kubernetes.io/name: catalog
    app.kubernetes.io/part-of: campus-capstone
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: catalog
  template:
    metadata:
      labels:
        app.kubernetes.io/name: catalog
        app.kubernetes.io/part-of: campus-capstone
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      containers:
        - name: catalog
          image: ghcr.io/owner/learncsharp/part07:sha-replace
          imagePullPolicy: IfNotPresent
          args: [Part07_DistributedComm.dll]
          ports:
            - { name: http, containerPort: 8080 }
            - { name: grpc, containerPort: 8081 }
          envFrom:
            - configMapRef: { name: campus-config }
          env:
            - { name: Distributed__Role, value: Catalog }
            - { name: Kestrel__Endpoints__Http__Url, value: "http://0.0.0.0:8080" }
            - { name: Kestrel__Endpoints__Http__Protocols, value: Http1 }
            - { name: Kestrel__Endpoints__Grpc__Url, value: "http://0.0.0.0:8081" }
            - { name: Kestrel__Endpoints__Grpc__Protocols, value: Http2 }
            - name: ConnectionStrings__Catalog
              valueFrom:
                secretKeyRef: { name: campus-secrets, key: catalog-connection }
            - name: GatewayAuth__InternalToken
              valueFrom:
                secretKeyRef: { name: campus-secrets, key: gateway-internal-token }
          startupProbe: &startup
            httpGet: { path: /health/live, port: http }
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe: &liveness
            httpGet: { path: /health/live, port: http }
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe: &readiness
            httpGet: { path: /health/ready, port: http }
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: "1", memory: 512Mi }
          securityContext: &security
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1654
            seccompProfile: { type: RuntimeDefault }
            capabilities: { drop: [ALL] }
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: tmp
          emptyDir: { sizeLimit: 64Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: catalog
  namespace: campus
spec:
  selector: { app.kubernetes.io/name: catalog }
  ports:
    - { name: http, port: 8080, targetPort: http }
    - { name: grpc, port: 8081, targetPort: grpc }
---
