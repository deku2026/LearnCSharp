apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: campus
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: campus-capstone
spec:
  replicas: 2
  minReadySeconds: 10
  progressDeadlineSeconds: 300
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 0, maxSurge: 1 }
  selector:
    matchLabels: { app.kubernetes.io/name: gateway }
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway
        app.kubernetes.io/part-of: campus-capstone
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      containers:
        - name: gateway
          image: ghcr.io/owner/learncsharp/part07:sha-replace
          args: [Part07_DistributedComm.dll]
          ports:
            - { name: http, containerPort: 8080 }
          envFrom:
            - configMapRef: { name: campus-config }
          env:
            - { name: Distributed__Role, value: Gateway }
            - name: GatewayAuth__SigningKey
              valueFrom:
                secretKeyRef: { name: campus-secrets, key: gateway-signing-key }
            - name: GatewayAuth__InternalToken
              valueFrom:
                secretKeyRef: { name: campus-secrets, key: gateway-internal-token }
          startupProbe:
            httpGet: { path: /health/live, port: http }
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet: { path: /health/live, port: http }
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet: { path: /health/ready, port: http }
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests: { cpu: 200m, memory: 192Mi }
            limits: { cpu: "1", memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1654
            seccompProfile: { type: RuntimeDefault }
            capabilities: { drop: [ALL] }
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: tmp
          emptyDir: { sizeLimit: 64Mi }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gateway
  namespace: campus
spec:
  minAvailable: 1
  selector:
    matchLabels: { app.kubernetes.io/name: gateway }
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: campus
spec:
  selector: { app.kubernetes.io/name: gateway }
  ports:
    - { name: http, port: 80, targetPort: http }
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gateway
  namespace: campus
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 1m
spec:
  ingressClassName: nginx
  rules:
    - host: campus.example.invalid
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port: { name: http }
