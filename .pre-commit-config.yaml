default_language_version:
  python: python3

exclude: |
  (?x)^(
    artifacts/.*|
    build/.*|
    dist/.*|
    out/.*|
    src/.*/Generated/.*
  )$

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-added-large-files
        args: [--maxkb=2048]
      - id: check-merge-conflict
      - id: check-json
      - id: check-yaml
      - id: check-executables-have-shebangs
        exclude: (?i)\.(md|yaml|yml|ignore|cs|csproj|props|targets|slnx|json|config)$
      - id: check-shebang-scripts-are-executable
        exclude: \.sh$

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        additional_dependencies: [tomli]
        args: [-I, .codespell-ignore]

  - repo: local
    hooks:
      - id: dotnet-format
        name: dotnet format
        entry: >-
          pwsh -NoLogo -NoProfile -Command
          "& { $env:MSBUILDDISABLENODEREUSE = '1'; dotnet format LearnCSharp.slnx --verify-no-changes --no-restore --verbosity minimal }"
        language: system
        pass_filenames: false
        require_serial: true
        files: \.cs$
