name: Linux CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Linux x64
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    services:
      redis:
        image: redis:8.8.0-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_USER: dotnet
          POSTGRES_PASSWORD: dotnet_dev
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dotnet -d postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      rabbitmq:
        image: rabbitmq:4.3.2-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: dotnet
          RABBITMQ_DEFAULT_PASS: dotnet_dev
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15
      kafka:
        image: apache/kafka:4.3.1
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://127.0.0.1:9092,EXTERNAL://127.0.0.1:9094
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@127.0.0.1:9093
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
        ports:
          - 9094:9094
        options: >-
          --health-cmd "timeout 5 bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/9094'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30
      mailpit:
        image: axllent/mailpit:latest
        ports:
          - 1125:1025
          - 8025:8025
        options: >-
          --health-cmd "wget -q -O - http://127.0.0.1:8025/api/v1/info || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 15
    env:
      DOTNET_NOLOGO: "1"
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
      MSBUILDDISABLENODEREUSE: "1"
      CAMPUS_W7_PG: "Host=127.0.0.1;Port=5432;Database=postgres;Username=dotnet;Password=dotnet_dev"
      CAMPUS_W7_RABBITMQ: "amqp://dotnet:dotnet_dev@127.0.0.1:5672/"
      CAMPUS_W9_PG: "Host=127.0.0.1;Port=5432;Database=postgres;Username=dotnet;Password=dotnet_dev"
      CAMPUS_W9_KAFKA: "127.0.0.1:9094"
      CAMPUS_W9_MAILPIT_API: "8025"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pre-commit

      - name: Verify tool versions
        run: |
          echo "dotnet:     $(dotnet --version)"
          echo "python:     $(python --version)"
          echo "pre-commit: $(pre-commit --version)"
          dotnet --list-sdks

      - name: Restore
        run: dotnet restore LearnCSharp.CI.slnx

      - name: Build (Debug)
        run: dotnet build LearnCSharp.CI.slnx -c Debug --no-restore

      - name: Build (Release)
        run: dotnet build LearnCSharp.CI.slnx -c Release --no-restore

      - name: Smoke - list every topic (Release)
        run: dotnet run --project src/LearnCSharp -c Release --no-build

      - name: Smoke - iterate every topic (Debug)
        run: dotnet run --project src/LearnCSharp -c Debug --no-build

      - name: Smoke - help
        run: dotnet run --project src/LearnCSharp -c Debug --no-build -- --help

      - name: Smoke - unknown topic exits non-zero
        run: |
          set +e
          dotnet run --project src/LearnCSharp -c Debug --no-build -- bogus/topic
          rc=$?
          set -e
          if [[ "$rc" != "2" ]]; then
            echo "expected exit 2 for unknown topic, got $rc" >&2
            exit 1
          fi

      # GitHub-hosted Ubuntu already has Docker Engine. Docker-backed PostgreSQL,
      # Redis, RabbitMQ and Keycloak suites live only in this Linux job. W7 reuses
      # the PostgreSQL/RabbitMQ services; isolated fixtures may start extra containers.
      - name: Verify Docker (for Testcontainers)
        run: |
          docker version
          docker info >/dev/null

      - name: Test (Release)
        # Docker suites share the explicitly provisioned broker. Running modules
        # sequentially prevents one lab's queue purge/consumer from stealing another's messages.
        run: dotnet test LearnCSharp.CI.slnx -c Release --no-build --max-parallel-test-modules 1

      - name: Run pre-commit hooks
        run: |
          set +e
          pre-commit run --all-files --show-diff-on-failure --color=always
          status=$?
          set -e
          if [[ ${status} -eq 0 ]]; then
            exit 0
          fi
          echo 'pre-commit made changes; rerunning once'
          pre-commit run --all-files --show-diff-on-failure --color=always

  cpp-cmake:
    name: C++ Linux x64 (Clang 22 + ${{ matrix.standard_library }})
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - standard_library: libstdc++
            stdlib_flags: -stdlib=libstdc++
          - standard_library: libc++
            stdlib_flags: -stdlib=libc++
    env:
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
      SCCACHE_CACHE_SIZE: 2G
      CMAKE_C_COMPILER_LAUNCHER: sccache
      CMAKE_CXX_COMPILER_LAUNCHER: sccache

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install clang 22 from apt.llvm.org + ninja
        # apt.llvm.org ships the latest patch of each major; aiming at 22.x to match
        # local clang-cl 22 (exact patch not promised within major 22).
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends wget gnupg lsb-release ninja-build python3-pip
          wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 22
          sudo apt-get install -y --no-install-recommends \
            clang-22 clang-tidy-22 clang-format-22 lld-22 libc++-22-dev libc++abi-22-dev
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-22 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-22 100
          sudo update-alternatives --install /usr/bin/clang-tidy clang-tidy /usr/bin/clang-tidy-22 100
          sudo update-alternatives --install /usr/bin/clang-format clang-format /usr/bin/clang-format-22 100

      - name: Install CMake 3.31
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "3.31.6"
          ninjaVersion: latest

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Restore sccache cache
        uses: actions/cache@v6
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-cpp-linux-${{ matrix.standard_library }}-${{ hashFiles('src/learncpp/CMakeLists.txt','src/learncpp/cmake/**','src/learncpp/CMakePresets.json') }}-${{ github.sha }}
          restore-keys: |
            sccache-cpp-linux-${{ matrix.standard_library }}-${{ hashFiles('src/learncpp/CMakeLists.txt','src/learncpp/cmake/**','src/learncpp/CMakePresets.json') }}-
            sccache-cpp-linux-${{ matrix.standard_library }}-

      - name: Verify tools
        env:
          STANDARD_LIBRARY: ${{ matrix.standard_library }}
        run: |
          set -euo pipefail
          /usr/bin/clang-22 --version
          /usr/bin/clang++-22 --version
          clang_major=$(/usr/bin/clang++-22 -dumpversion | cut -d. -f1)
          if [ "$clang_major" != 22 ]; then
            echo "expected Clang major 22, got '$clang_major'" >&2
            exit 1
          fi
          if [ "$STANDARD_LIBRARY" = "libstdc++" ]; then
            printf 'GNU C++: %s\n' "$(g++-14 -dumpfullversion)"
          fi
          cmake --version | head -n 1
          ninja --version
          sccache --version

      - name: Configure
        working-directory: src/learncpp
        env:
          CC: /usr/bin/clang-22
          CXX: /usr/bin/clang++-22
          STDLIB_FLAGS: ${{ matrix.stdlib_flags }}
        run: |
          set -euo pipefail
          cmake_args=(
            --preset linux-ci
            -DCMAKE_CXX_COMPILER=/usr/bin/clang++-22
          )
          if [ -n "$STDLIB_FLAGS" ]; then
            cmake_args+=(
              "-DCMAKE_CXX_FLAGS=$STDLIB_FLAGS"
              "-DCMAKE_EXE_LINKER_FLAGS=$STDLIB_FLAGS"
            )
          fi
          cmake "${cmake_args[@]}"
          configured_compiler=$(sed -n 's/^CMAKE_CXX_COMPILER:[^=]*=//p' build/linux-ci/CMakeCache.txt)
          if [ "$configured_compiler" != /usr/bin/clang++-22 ]; then
            echo "CMake selected unexpected compiler '$configured_compiler'" >&2
            exit 1
          fi

      - name: Build all translation units
        working-directory: src/learncpp
        run: cmake --build --preset linux-ci -- -k 0

      - name: Smoke-run learn_cpp (list registered topics)
        working-directory: src/learncpp
        run: |
          set -euo pipefail
          exe=build/linux-ci/bin/learn_cpp
          output=$("$exe")
          printf '%s\n' "$output" | sed -n '1,5p'
          header=${output%%$'\n'*}
          listed=$(printf '%s\n' "$output" | sed -n 's/^  //p' | wc -l | tr -d ' ')
          if [ "$header" != 'learn_cpp: 874 topics registered' ] || [ "$listed" -ne 874 ]; then
            echo "expected exactly 874 registered topics; header='$header', listed=$listed" >&2
            exit 1
          fi
          echo "OK (874 registered topics)"

      - name: sccache stats
        if: always()
        run: sccache --show-stats

      - name: Install pre-commit
        if: ${{ always() && matrix.standard_library == 'libstdc++' }}
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pre-commit

      - name: Run pre-commit (C++ hooks; dotnet-format needs the dotnet job)
        if: ${{ always() && matrix.standard_library == 'libstdc++' }}
        env:
          SKIP: dotnet-format
        run: pre-commit run --all-files --show-diff-on-failure --color=always
