name: Windows CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  build:
    name: Windows x64
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      DOTNET_NOLOGO: "1"
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
      MSBUILDDISABLENODEREUSE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '21'

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses
        shell: bash

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pre-commit

      - name: Verify tool versions
        run: |
          Write-Host "dotnet:     $(& dotnet --version)"
          Write-Host "java:       $(& java --version 2>&1 | Select-Object -First 1)"
          Write-Host "python:     $(& python --version)"
          Write-Host "pre-commit: $(& pre-commit --version)"
          & dotnet --list-sdks

      - name: Locate MSBuild
        id: vswhere
        run: |
          $msbuild = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -requires Microsoft.Component.MSBuild -find "MSBuild\**\Bin\MSBuild.exe" | Select-Object -First 1
          if (-not $msbuild) { Write-Error "MSBuild.exe not found"; exit 1 }
          Write-Host "MSBuild: $msbuild"
          "path=$msbuild" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore LearnCSharp.slnx

      - name: Build (Debug)
        run: |
          & "${{ steps.vswhere.outputs.path }}" LearnCSharp.slnx /p:Configuration=Debug /nologo /v:minimal /m

      - name: Build (Release)
        run: |
          & "${{ steps.vswhere.outputs.path }}" LearnCSharp.slnx /p:Configuration=Release /nologo /v:minimal /m

      - name: Smoke - list every topic (Release)
        run: dotnet run --project src/LearnCSharp -c Release --no-build

      - name: Smoke - iterate every topic (Debug)
        run: dotnet run --project src/LearnCSharp -c Debug --no-build

      - name: Smoke - help
        run: dotnet run --project src/LearnCSharp -c Debug --no-build -- --help

      - name: Smoke - unknown topic exits non-zero
        run: |
          $proc = Start-Process -FilePath dotnet `
            -ArgumentList 'run','--project','src/LearnCSharp','-c','Debug','--no-build','--','bogus/topic' `
            -NoNewWindow -Wait -PassThru
          if ($proc.ExitCode -ne 2) {
            Write-Error "expected exit 2 for unknown topic, got $($proc.ExitCode)"
            exit 1
          }

      - name: Run pre-commit hooks
        run: |
          $env:MSBUILDDISABLENODEREUSE = "1"
          pre-commit run --all-files --show-diff-on-failure --color=always
          if ($LASTEXITCODE -eq 0) { exit 0 }
          Write-Host 'pre-commit made changes; rerunning once'
          pre-commit run --all-files --show-diff-on-failure --color=always
